<!DOCTYPE html>
<html lang="sv" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Metric card</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Instrument+Serif:ital@1&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── PROPS — the skill edits this block per video (re-skin colours via frame.md) ── -->
    <script>
      window.METRIC_CARD_PROPS = {
        mode: "dark", // "dark" | "light"
        ground: "dark", // scene background: "dark" | "cream" | "coral" | "none" (flat). Defaults to dark/cream by mode.
        accentColor: "#ff5b49", // overrides --coral; the hero number colour
        heroIndex: 0, // which cell gets the coral accent (0-based)
        eyebrow: "RESULTAT",
        title: "Siffrorna",
        // values + labels are positional. Use a placeholder for any number you don't have.
        values: ["[din siffra]", "[din siffra]", "[din siffra]", "[din siffra]"],
        labels: ["svarsfrekvens", "per sökning", "timmar sparade", "snabbare"],
      };
    </script>

    <div
      id="root"
      data-composition-id="metric-card"
      data-start="0"
      data-duration="3.2"
      data-width="1080"
      data-height="1920"
    >
      <div class="backdrop"></div>
      <div class="mc-wrap clip" data-start="0" data-duration="3.2" data-track-index="3">
        <div class="mc-head">
          <div class="mc-eyebrow" id="mc-eyebrow"></div>
          <h1 class="mc-title" id="mc-title"></h1>
        </div>
        <div class="mc-grid" id="mc-grid"></div>
      </div>
    </div>

    <script src="animation.js"></script>
  </body>
</html>
