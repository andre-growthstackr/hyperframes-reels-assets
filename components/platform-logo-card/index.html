<!DOCTYPE html>
<html lang="sv" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Platform logo card</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Instrument+Serif:ital@1&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── PROPS — the skill edits this block per video (re-skin colours via frame.md) ── -->
    <script>
      window.PLATFORM_LOGO_CARD_PROPS = {
        mode: "dark", // "dark" | "light"
        ground: "dark", // scene background: "dark" | "cream" | "coral" | "none" (flat). Defaults to dark/cream by mode.
        logo: "claude", // tool id → renders logos/<logo>.svg (see logos/logos.manifest ids)
        label: "Claude Code", // optional tool name under the logo, in Inter (white). "" hides it
        accentColor: "#ff5b49", // overrides --coral; the single coral accent (pin-dot + underline)
      };
    </script>

    <div
      id="root"
      data-composition-id="platform-logo-card"
      data-start="0"
      data-duration="2.6"
      data-width="1080"
      data-height="1920"
    >
      <div class="backdrop"></div>
      <div class="plc-wrap clip" data-start="0" data-duration="2.6" data-track-index="3">
        <img class="plc-logo" id="plc-logo" alt="" />
        <div class="plc-label" id="plc-label"></div>
        <div class="plc-underline" id="plc-underline"></div>
      </div>
    </div>

    <script src="animation.js"></script>
  </body>
</html>
