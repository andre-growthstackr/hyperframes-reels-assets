<!DOCTYPE html>
<html lang="sv" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Logo reveal (coral)</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Instrument+Serif:ital@1&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --canvas: #050505;
        --white: #ffffff;
        --coral: #ff5b49;
        --violet: #7f56d9;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: var(--canvas);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { position: absolute; inset: 0; }
      .backdrop {
        position: absolute; inset: 0;
        background: radial-gradient(120% 80% at 50% 45%, #121317 0%, var(--canvas) 62%);
      }
      .logo-wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 40px;
      }
      /* The mark: a coral rising-bars / growth glyph */
      .mark {
        display: flex; align-items: flex-end; gap: 14px; height: 200px;
      }
      .mark span {
        width: 46px; border-radius: 12px; background: var(--violet);
        transform-origin: bottom;
      }
      .mark span:nth-child(1) { height: 90px; }
      .mark span:nth-child(2) { height: 140px; }
      .mark span:nth-child(3) { height: 200px; background: var(--coral); }
      .wordmark {
        font-size: 112px; font-weight: 800; letter-spacing: -0.04em; color: var(--white);
      }
      .wordmark .accent { color: var(--coral); }
      .glow {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 900px; height: 900px; border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 91, 73, 0.28) 0%, transparent 60%);
        opacity: 0;
      }
      .flare {
        position: absolute; inset: -10% -30%; z-index: 9; pointer-events: none; opacity: 0;
        background: linear-gradient(100deg, transparent 30%, rgba(255,245,235,0.9) 50%, transparent 70%);
        mix-blend-mode: screen; filter: blur(2px);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="logo-reveal-coral"
      data-start="0"
      data-duration="1.3"
      data-width="1080"
      data-height="1920"
    >
      <div class="backdrop"></div>
      <div class="glow clip" id="glow" data-start="0" data-duration="1.3" data-track-index="2"></div>
      <div class="logo-wrap clip" data-start="0" data-duration="1.3" data-track-index="3">
        <div class="mark" id="mark"><span></span><span></span><span></span></div>
        <div class="wordmark" id="wordmark">growth<span class="accent">stackr</span></div>
      </div>
      <div class="flare clip" id="flare" data-start="0" data-duration="1.3" data-track-index="9"></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // bars grow first (the "growth")
      tl.from("#mark span", { scaleY: 0, opacity: 0, duration: 0.4, stagger: 0.08, ease: "back.out(1.8)" }, 0.05);
      // wordmark scales in with soft impact
      tl.from("#wordmark", { scale: 0.78, opacity: 0, duration: 0.5, ease: "back.out(1.5)" }, 0.3);
      // soft impact settle (tiny overshoot landing)
      tl.to(".logo-wrap", { scale: 1.03, duration: 0.12, ease: "power2.out" }, 0.62)
        .to(".logo-wrap", { scale: 1.0, duration: 0.25, ease: "power2.inOut" }, 0.74);
      // coral glow blooms behind on impact
      tl.fromTo("#glow", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" }, 0.6);
      // signature flare sweep across the reveal
      tl.fromTo("#flare", { opacity: 0, xPercent: -60 }, { opacity: 0.9, xPercent: 0, duration: 0.22, ease: "power2.in" }, 0.55)
        .to("#flare", { opacity: 0, xPercent: 60, duration: 0.22, ease: "power2.out" }, 0.77);

      window.__timelines["logo-reveal-coral"] = tl;
    </script>
  </body>
</html>
