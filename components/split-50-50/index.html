<!DOCTYPE html>
<html lang="sv" data-resolution="portrait">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Split 50/50</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Instrument+Serif:ital@1&display=swap"
    />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── PROPS — the skill edits this block per video (re-skin colours via frame.md) ── -->
    <script>
      window.SPLIT_50_50_PROPS = {
        mode: "dark", // "dark" | "light"
        topRatio: 0.55, // split point — top slot height as a fraction of the frame
        topLabel: "B-roll · UI · graphics", // faint placeholder inside the top slot
        headLabel: "talking head", // faint placeholder inside the head slot
        showSeamHairline: true, // 1px hairline at the seam
      };
    </script>

    <div
      id="root"
      data-composition-id="split-50-50"
      data-start="0"
      data-duration="3.2"
      data-width="1080"
      data-height="1920"
    >
      <!-- head (home base) — the talking-head slot, filled at build time -->
      <div id="headSlot" class="slot head clip" data-start="0" data-duration="3.2" data-track-index="0">
        <div class="slot-inner">
          <span class="placeholder" id="head-label"></span>
        </div>
      </div>

      <!-- top panel — B-roll / graphics slot; slides down to form the split -->
      <div id="topSlot" class="slot top clip" data-start="0" data-duration="3.2" data-track-index="1">
        <div class="slot-inner">
          <span class="placeholder" id="top-label"></span>
        </div>
      </div>

      <!-- seam hairline -->
      <div id="seam" class="seam clip" data-start="0" data-duration="3.2" data-track-index="2"></div>
    </div>

    <script src="animation.js"></script>
  </body>
</html>
